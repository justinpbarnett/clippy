<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:1280px;height:800px;overflow:hidden;background:#080503;
  display:flex;align-items:center;padding:0 90px;gap:70px;position:relative;
}
body::after{
  content:'';position:absolute;right:360px;top:50%;transform:translateY(-50%);
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(200,122,56,0.08) 0%,transparent 70%);
  pointer-events:none;
}
body::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:200px 200px;opacity:0.4;pointer-events:none;z-index:0;
}
.left{flex:1;position:relative;z-index:1}
.right{position:relative;z-index:1;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:44px}
.logo-jar{color:#C87A38}
.logo-name{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#C87A38;letter-spacing:0.2em;text-transform:uppercase}
h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:64px;font-weight:600;line-height:1.05;color:#EED9B5;margin-bottom:22px;letter-spacing:-0.01em}
h1 em{font-style:italic;color:#E8A848}
p{font-family:'Space Mono',monospace;font-size:13px;line-height:1.8;color:#5A4030;max-width:360px;letter-spacing:0.02em}
.rule{width:40px;height:1.5px;background:#C87A38;margin-bottom:28px;opacity:0.6}
.label-tag{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#5A4030;border:1px solid #2C1D0A;padding:4px 10px;border-radius:2px;margin-bottom:22px}
.frame{background:#0D0A06;border-radius:6px;box-shadow:0 0 0 1px #2C1D0A,0 40px 80px rgba(0,0,0,0.8),0 0 80px rgba(200,122,56,0.12);overflow:hidden}
.frame-bar{padding:9px 12px;display:flex;align-items:center;gap:7px;border-bottom:1px solid #2C1D0A;background:#141009}
.dot{width:9px;height:9px;border-radius:50%}
.dot-r{background:#ff5f57}.dot-y{background:#febc2e}.dot-g{background:#28c840}
img{display:block;width:380px;height:500px}
</style>
</head>
<body>
  <div class="left">
    <div class="logo">
      <svg class="logo-jar" width="18" height="22" viewBox="0 0 13 17" fill="none">
        <rect x="2" y="0.5" width="9" height="2.5" rx="0.8" fill="currentColor" opacity="0.85"/>
        <rect x="3.5" y="3" width="6" height="1.5" fill="currentColor" opacity="0.55"/>
        <path d="M1.5 4.5L1 14Q1 15.5 2.5 15.5H10.5Q12 15.5 12 14L11.5 4.5Z" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-opacity="0.65" stroke-width="0.9"/>
        <line x1="3.5" y1="6" x2="3" y2="13.5" stroke="currentColor" stroke-width="0.9" opacity="0.25" stroke-linecap="round"/>
      </svg>
      <span class="logo-name">Clipjar</span>
    </div>
    <div class="label-tag">Fuzzy search</div>
    <h1>Find it in<br><em>milliseconds.</em></h1>
    <div class="rule"></div>
    <p>Fuzzy search across your full history.<br>Handles typos, partials, and fragments.</p>
  </div>
  <div class="right">
    <div class="frame">
      <div class="frame-bar">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <img src="popup-search.png" />
    </div>
  </div>
</body>
</html>
